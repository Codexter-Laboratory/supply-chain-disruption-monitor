services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scm
      POSTGRES_PASSWORD: scm
      POSTGRES_DB: supply_chain_monitor
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U scm -d supply_chain_monitor']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://scm:scm@postgres:5432/supply_chain_monitor?schema=public
      PORT: '3000'
      SIMULATION_ENABLED: 'true'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
